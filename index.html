<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>飓智诚网络科技工作室 | 科技驱动全球</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'PingFang SC', sans-serif;
            background: #030507;
            color: #eef2ff;
            line-height: 1.5;
            overflow-x: hidden;
        }
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
        header {
            backdrop-filter: blur(14px);
            background: rgba(3, 5, 7, 0.65);
            border-bottom: 1px solid rgba(110, 231, 183, 0.2);
            position: sticky; top: 0; z-index: 100;
        }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .logo {
            font-size: 1.65rem; font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #6ee7b7);
            background-clip: text; -webkit-background-clip: text; color: transparent;
        }
        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a { text-decoration: none; color: #cbd5e6; transition: 0.2s; font-weight: 500; }
        .nav-links a:hover { color: #6ee7b7; }

        .hero { padding: 120px 0 100px; text-align: center; }
        .hero h1 {
            font-size: 3.4rem; font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #9ce6c2);
            background-clip: text; -webkit-background-clip: text; color: transparent;
            margin-bottom: 20px;
        }
        .tagline { font-size: 1.2rem; color: #9ab3cc; margin-bottom: 32px; max-width: 700px; margin-left: auto; margin-right: auto; }
        
        .btn {
            display: inline-block; padding: 14px 36px; border-radius: 48px;
            background: linear-gradient(95deg, #1f6e43, #2b8c54);
            color: white; text-decoration: none; font-weight: 600; cursor: pointer; transition: 0.3s;
            border: none;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(110, 231, 183, 0.3); }

        .section { padding: 90px 0; border-bottom: 1px solid rgba(110, 231, 183, 0.08); }
        .section-title { text-align: center; font-size: 2.4rem; margin-bottom: 60px; font-weight: 700; }
        .section-title::after { content: ''; display: block; width: 60px; height: 4px; background: #6ee7b7; margin: 15px auto; border-radius: 2px; }

        .services-grid { display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; }
        .service-tag {
            background: rgba(15, 25, 35, 0.7); border: 1px solid rgba(110, 231, 183, 0.2);
            border-radius: 50px; padding: 14px 30px; color: #d1e5f5; font-weight: 500;
            transition: 0.3s;
        }
        .service-tag:hover { border-color: #6ee7b7; background: rgba(110, 231, 183, 0.1); transform: scale(1.05); }

        .advantages-grid { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
        .adv-card {
            background: rgba(15, 25, 35, 0.6); border: 1px solid rgba(110, 231, 183, 0.15);
            border-radius: 30px; padding: 40px 30px; flex: 1; min-width: 280px; text-align: center;
            transition: 0.4s; opacity: 0; transform: translateY(30px);
        }
        .adv-card.visible { opacity: 1; transform: translateY(0); }
        .adv-card h3 { color: #6ee7b7; margin-bottom: 15px; font-size: 1.5rem; }
        .adv-card p { color: #9ab3cc; font-size: 0.95rem; }

        .form-section {
            background: rgba(8, 12, 18, 0.8); border-radius: 40px; padding: 50px;
            max-width: 800px; margin: 0 auto; border: 1px solid rgba(110, 231, 183, 0.2);
            backdrop-filter: blur(10px);
        }
        .contact-form { display: flex; flex-direction: column; gap: 25px; }
        .contact-form input, .contact-form textarea {
            background: rgba(14, 19, 28, 0.9); border: 1px solid #2d3e35; padding: 18px;
            border-radius: 15px; color: white; width: 100%; font-size: 1rem; outline: none;
            transition: 0.3s;
        }
        .status-message { text-align: center; margin-top: 25px; font-weight: 600; min-height: 24px; }
        
        footer { padding: 60px 20px; text-align: center; color: #7e92ab; border-top: 1px solid rgba(110, 231, 183, 0.1); }

        .floating-menu { position: fixed; right: 24px; bottom: 80px; display: flex; flex-direction: column; gap: 16px; }
        .floating-btn {
            width: 50px; height: 50px; border-radius: 50%; background: rgba(15, 25, 35, 0.8);
            border: 1px solid rgba(110, 231, 183, 0.4); color: #6ee7b7; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.4rem; }
            .nav-links { display: none; }
            .form-section { padding: 30px 20px; }
        }
    </style>
</head>
<body>
<canvas id="particle-canvas"></canvas>

<header>
    <div class="container">
        <div class="navbar">
            <div class="logo">飓智诚 · 科技驱动全球</div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#services">服务</a></li>
                <li><a href="#advantages">优势</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </div>
</header>

<main>
    <section id="home" class="hero">
        <div class="container">
            <h1>飓智诚网络科技工作室</h1>
            <p class="tagline">链接全球贸易 · 赋能循环经济 · 智创科技价值</p>
            <a href="#contact" class="btn">立即咨询</a>
        </div>
    </section>

    <section id="services" class="section">
        <div class="container">
            <div class="section-title">业务矩阵</div>
            <div class="services-grid">
                <span class="service-tag">🌐 互联网销售</span>
                <span class="service-tag">📦 进出口综合服务</span>
                <span class="service-tag">♻️ 旧货与再生资源</span>
                <span class="service-tag">🛍️ 日用百货贸易</span>
            </div>
        </div>
    </section>

    <section id="advantages" class="section">
        <div class="container">
            <div class="section-title">核心优势</div>
            <div class="advantages-grid">
                <div class="adv-card">
                    <h3>合规经营</h3>
                    <p>持有完整经营资质，每一笔交易均合法透明。</p>
                </div>
                <div class="adv-card">
                    <h3>全球网络</h3>
                    <p>深耕国际进出口渠道，提供高效的代理与技术支持。</p>
                </div>
                <div class="adv-card">
                    <h3>循环经济</h3>
                    <p>专业评估旧货价值，精准对接再生资源，助力资产盘活。</p>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="section">
        <div class="container">
            <div class="form-section">
                <h2 style="text-align:center; margin-bottom:35px; color:#6ee7b7;">📩 业务咨询留言</h2>
                <form id="contactForm" class="contact-form">
                    <input type="text" id="userName" placeholder="您的称呼" required>
                    <input type="text" id="userContact" placeholder="联系方式 (微信/手机)" required>
                    <textarea rows="5" id="message" placeholder="请描述您的业务需求..." required></textarea>
                    <button type="submit" class="btn" id="submitBtn" style="width:100%;">提交留言 →</button>
                    <div id="formStatus" class="status-message"></div>
                </form>
            </div>
        </div>
    </section>
</main>

<footer>
    <p>© 2026 飓智诚网络科技工作室 | 13550462023 | 微信: gcLookahead</p>
</footer>

<div class="floating-menu">
    <div class="floating-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</div>
</div>

<script>
    // 初始化 EmailJS
    emailjs.init("KTToKYZ7Rx-Rx793g");

    // 粒子动画
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [];
    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', init);
    init();
    class P {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5;
            this.s = Math.random() * 2;
        }
        draw() {
            this.x += this.vx; this.y += this.vy;
            if (this.x<0||this.x>w||this.y<0||this.y>h) this.reset();
            ctx.fillStyle = "rgba(110, 231, 183, 0.4)";
            ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill();
        }
    }
    for(let i=0; i<80; i++) particles.push(new P());
    function loop() { ctx.clearRect(0,0,w,h); particles.forEach(p=>p.draw()); requestAnimationFrame(loop); }
    loop();

    // 滚动显示
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.adv-card').forEach(el => observer.observe(el));

    // 核心：发送逻辑
    const form = document.getElementById('contactForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('formStatus');
        
        btn.disabled = true;
        btn.textContent = "正在提交...";
        status.innerText = "⏳ 正在连接邮件服务器...";

        try {
            await emailjs.send("U67V9qzOyR3yJFUmwAKIt", "template_a8lfafl", {
                from_name: document.getElementById('userName').value,
                from_contact: document.getElementById('userContact').value,
                message: document.getElementById('message').value
            });
            status.innerText = "✅ 留言已送达！我们会尽快回复。";
            status.style.color = "#6ee7b7";
            form.reset();
        } catch (err) {
            status.innerText = "❌ 发送失败，请直接添加微信：gcLookahead";
            status.style.color = "#ff6b6b";
        } finally {
            btn.disabled = false;
            btn.textContent = "提交留言 →";
        }
    });
</script>
</body>
</html>
